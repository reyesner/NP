<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>HTML + CSS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <section id="TOP_SECTION">
      <nav
        class="navbar fixed-top navbar-expand-md bg-body-tertiary"
        data-bs-theme="dark"
      >
        <div class="title">Next Play Games</div>
        <div class="collapse navbar-collapse" id="navbarNav">
        </div>
      </nav>
    </section>
    <section id="DROP_DOWN">
        <div class="container-fluid px-5 mt-4"> <!-- ~80px edge spacing -->
        <div class="board">

        <div class="column" data-status="todo">
        <h5 class="text-center" id="todo">To Do</h5>
        <button onclick="addTask(this)">+ Add</button>
        </div>

        <div class="column" data-status="progress">
        <h5 class="text-center" id="inprogress">In Progress</h5>
        <button onclick="addTask(this)">+ Add</button>
        </div>

        <div class="column" data-status="review">
        <h5 class="text-center" id="inreview">In Review</h5>
        <button onclick="addTask(this)">+ Add</button>
        </div>

        <div class="column" data-status="complete">
        <h5 class="text-center" id="complete">Complete</h5>
        <button onclick="addTask(this)">+ Add</button>
        </div>

        </div>
        </div>
    </section>
    <script type="module" src="script.js"></script>
  </body>
</html>

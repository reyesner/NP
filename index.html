<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Tremble</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <section id="TOP_SECTION">
      <nav
        class="navbar fixed-top navbar-expand-md bg-body-tertiary"
        data-bs-theme="dark"
      >
        <div class="title">Tremble</div>
        <div class="collapse navbar-collapse" id="navbarNav">
        </div>
      </nav>
    </section>
    <section id="DROP_DOWN">
        <div class="container-fluid px-5 mt-4"> <!-- ~80px edge spacing -->
        <div class="board">

        <div class="column" data-status="todo">
        <h5 class="text-center" id="todo">To Do</h5>
        <button class="add-btn btn btn-sm btn-primary">+ Add</button>
        </div>

        <div class="column" data-status="progress">
        <h5 class="text-center" id="inprogress">In Progress</h5>
        <button class="add-btn btn btn-sm btn-primary">+ Add</button>
        </div>

        <div class="column" data-status="review">
        <h5 class="text-center" id="inreview">In Review</h5>
        <button class="add-btn btn btn-sm btn-primary">+ Add</button>
        </div>

        <div class="column" data-status="complete">
        <h5 class="text-center" id="complete">Complete</h5>
        <button class="add-btn btn btn-sm btn-primary">+ Add</button>
        </div>

        </div>
        </div>
    </section>
    <section class="MODALS_CREATE">
<div class="modal fade" id="taskModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      
      <h5>Create Task</h5>

      <!-- Title -->
      <input id="taskTitle" class="form-control mb-3" placeholder="Task title">

      <!-- Priority -->
      <select id="taskPriority" class="form-select mb-3">
        <option value="">Select Priority</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <!-- Due Date -->
      <input type="date" id="taskDueDate" class="form-control mb-3">
      <textarea id="taskDescription" class="form-control mb-3" placeholder="Task description"></textarea>

      <button class="btn btn-primary" id="saveTask">Save</button>

    </div>
  </div>
</div>
    </section>
    <section class="MODALS_DELETE">
      <div class="modal fade" id="deleteModal">
        <div class="modal-dialog">
        <div class="modal-content p-3">
          
          <h5>Delete Task</h5>
          <p>Are you sure you want to delete this task?</p>

          <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-danger" id="confirmDelete">Delete</button>
          </div>

      </div>
      </div>
    </div>
    </section>

    <section class="MODEL_DETAIL">
      <div class="modal fade" id="detailModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h3 id="detailTitle"></h3>

      <h5>Description</h5>
      <p id="detailDescription"></p>

      <p><strong>Priority:</strong> <span id="detailPriority"></span></p>
      <p><strong>Due Date:</strong> <span id="detailDueDate"></span></p>

      <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-warning" id="editFromDetail">Edit</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>
    </section>
  </body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
</html>
